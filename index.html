    <!-- Input Screen -->
    <div id="main-screen" class="screen active" tabindex="-1">
        <div class="input-card">
            <div class="app-icon">💕</div>
            <h1 class="app-title" data-i18n="app.title">Name Compatibility Test</h1>
            <p class="app-subtitle" data-i18n="app.subtitle">How compatible are your names?</p>

            <div class="trust-badge">
                <span class="badge-icon">🔥</span>
                <span class="badge-count" id="trust-count">120,000+</span>
                <span class="badge-label" data-i18n="app.tested">tests completed</span>
            </div>

            <div class="name-inputs">
                <div class="input-group">
                    <label for="name1" data-i18n="input.name1Label">Your Name</label>
                    <input type="text" id="name1" maxlength="30" data-i18n-placeholder="input.name1Placeholder" placeholder="Enter your name" autocomplete="off">
                </div>
                <div class="heart-divider">💗</div>
                <div class="input-group">
                    <label for="name2" data-i18n="input.name2Label">Their Name</label>
                    <input type="text" id="name2" maxlength="30" data-i18n-placeholder="input.name2Placeholder" placeholder="Enter their name" autocomplete="off">
                </div>
            </div>

            <button id="btn-calculate" class="btn-calculate" disabled data-i18n="input.calculate">Calculate Compatibility</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
        <div class="loading-card">
            <div class="loading-hearts">
                <span class="heart h1">💗</span>
                <span class="heart h2">💕</span>
                <span class="heart h3">💖</span>
            </div>
            <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
            <p class="loading-text" id="loading-text" data-i18n="loading.analyzing">Analyzing compatibility...</p>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <div class="result-card">
            <div class="result-names" id="result-names"></div>

            <div class="score-circle">
                <svg viewBox="0 0 200 200" class="score-svg">

                    <circle cx="100" cy="100" r="85" fill="none" stroke="#ff4d6d" stroke-width="12" stroke-linecap="round"
                            stroke-dasharray="534" stroke-dashoffset="534" id="score-ring"
                            transform="rotate(-90 100 100)"/>
                </svg>
                <div class="score-inner">
                    <span class="score-number" id="score-number">0</span>
                    <span class="score-percent">%</span>
                </div>
            </div>

            <p class="score-label" id="score-label"></p>
            <p class="score-desc" id="score-desc"></p>

                <button id="btn-retry" class="btn-action btn-retry" data-i18n="result.retry">🔄 Try Again</button>
